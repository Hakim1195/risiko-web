services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v2.9
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml
    networks:
      - game-network

  # Base de données MySQL
  database:
    image: mysql:8.0
    container_name: game-board-db
    environment:
      - MYSQL_DATABASE=gameboard
      - MYSQL_USER=gameboard_user
      - MYSQL_PASSWORD=gameboard_password
      - MYSQL_ROOT_PASSWORD=gameboard_root_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - game-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - game-network

  # Backend API Service
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: game-board-backend
    environment:
      - NODE_ENV=production
      - DB_HOST=database
      - DB_PORT=3306
      - DB_NAME=gameboard
      - DB_USER=gameboard_user
      - DB_PASSWORD=gameboard_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - database
      - redis
    networks:
      - game-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.game.local`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"

  # Frontend Service
  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: game-board-frontend
    depends_on:
      - backend-api
    networks:
      - game-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`game.local`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

volumes:
  mysql_data:
  redis_data:

networks:
  game-network:
    driver: bridge

