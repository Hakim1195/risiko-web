name: Deploiement Local VM

on:  
  push:    
    branches:      
      - main

jobs:  
  deploy:    
    name: Build et Déploiement Docker    
    runs-on: self-hosted        
    
    steps:      
      - name: Récupération du code source        
        uses: actions/checkout@v4      

      #- name: Injection de la configuration de Production
        # On copie le vrai .env depuis le coffre-fort du VPS vers le dossier de travail actuel
      #  run: cp /home/hakim/risiko-secrets/.env ./.env

      - name: Nettoyage léger
        run: docker system prune -f

      - name: Build et redémarrage fluide des conteneurs        
        run: docker-compose up -d --build

      - name: Vérification du déploiement        
        run: docker-compose ps
        